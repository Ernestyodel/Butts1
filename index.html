<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>BUTTS</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{

font-family:Inter,sans-serif;

background:#000;

color:#fff;

overflow-x:hidden;

}

/* Background Logo */

body::before{

content:"";

position:fixed;

top:50%;

left:50%;

width:900px;

height:900px;

transform:translate(-50%,-50%);

background:url("butts-logo.png") center center no-repeat;

background-size:contain;

opacity:.04;

pointer-events:none;

z-index:-1;

}

/* Container */

.container{

width:92%;

max-width:1400px;

margin:auto;

}

/* Header */

header{

display:flex;

justify-content:space-between;

align-items:center;

padding:30px 0;

}

.logo{

font-size:40px;

font-weight:800;

letter-spacing:10px;

}

.music{

width:70px;

height:70px;

border:1px solid #fff;

border-radius:50%;

display:flex;

justify-content:center;

align-items:center;

cursor:pointer;

transition:.3s;

font-size:15px;

}

.music:hover{

background:#fff;

color:#000;

transform:scale(1.05);

}

/* Hero */

.hero{

min-height:80vh;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

text-align:center;

gap:30px;

}

.hero img{

width:320px;

max-width:90%;

filter:invert(1);

animation:float 6s ease-in-out infinite;

}

@keyframes float{

0%,100%{

transform:translateY(0);

}

50%{

transform:translateY(-18px);

}

}

.hero h1{

font-size:100px;

font-weight:800;

letter-spacing:12px;

}

.hero p{

max-width:700px;

font-size:22px;

line-height:1.8;

color:#a0a0a0;

}

.hero button{

padding:18px 35px;

border:1px solid #fff;

background:transparent;

color:#fff;

border-radius:50px;

cursor:pointer;

font-size:16px;

transition:.3s;

}

.hero button:hover{

background:#fff;

color:#000;

}

/* Divider */

.divider{

height:1px;

background:#222;

margin:80px 0;

}

/* Sections */

.section-title{

font-size:48px;

margin-bottom:50px;

letter-spacing:5px;

}

/* Videos */

.video-grid{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(350px,1fr));

gap:30px;

}

.video-card{

height:250px;

border:1px solid #fff;

border-radius:30px;

overflow:hidden;

transition:.3s;

}

.video-card:hover{

transform:translateY(-5px);

}

.video-card video{

width:100%;

height:100%;

object-fit:cover;

}

/* Gallery */

.gallery-grid{

column-count:3;

column-gap:25px;

}

.gallery-item{

margin-bottom:25px;

overflow:hidden;

border:1px solid #fff;

border-radius:30px;

}

.gallery-item img{

width:100%;

display:block;

filter:grayscale(100%);

transition:.4s;

}

.gallery-item:hover img{

transform:scale(1.04);

}

/* Footer */

footer{

padding:100px 0 50px;

text-align:center;

color:#777;

}

#audio{

display:none;

}

/* Mobile */

@media(max-width:900px){

.gallery-grid{

column-count:2;

}

.hero h1{

font-size:70px;

}

}

@media(max-width:768px){

.gallery-grid{

column-count:1;

}

.hero h1{

font-size:52px;

}

.hero p{

font-size:18px;

}

.logo{

font-size:28px;

}

.music{

width:60px;

height:60px;

}

.section-title{

font-size:34px;

}

}

</style>

</head>

<body>

<div class="container">

<header>

<div class="logo">

BUTTS

</div>

<div class="music" onclick="toggleMusic()">

🎵

</div>

</header>

<section class="hero">

<img src="butts-logo.png">

<h1>BUTTS</h1>

<p>

The cleanest meme experience on the internet.

Videos, memes, music, chaos and pure BUTTS energy.

</p>

<button>

Enter Chaos

</button>

</section>

<div class="divider"></div>

<section>

<div class="section-title">

VIDEOS

</div>

<div class="video-grid">

<div class="video-card">

<video controls>

<source src="video1.mp4">

</video>

</div>

<div class="video-card">

<video controls>

<source src="video2.mp4">

</video>

</div>

<div class="video-card">

<video controls>

<source src="video3.mp4">

</video>

</div>

</div>

</section>

<div class="divider"></div>

<section>

<div class="section-title">

BUTTS GALLERY

</div>

<div class="gallery-grid">

<div class="gallery-item">

<img src="gallery1.jpg">

</div>

<div class="gallery-item">

<img src="gallery2.jpg">

</div>

<div class="gallery-item">

<img src="gallery3.jpg">

</div>

<div class="gallery-item">

<img src="gallery4.jpg">

</div>

<div class="gallery-item">

<img src="gallery5.jpg">

</div>

<div class="gallery-item">

<img src="gallery6.jpg">

</div>

</div>

</section>

<footer>

Made with pure BUTTS energy 🍑

</footer>

<audio id="audio" loop>

<source src="Buttsss(MP3_320K).mp3" type="audio/mpeg">

</audio>

</div>

<script>

const audio=document.getElementById("audio");

const musicButton=document.querySelector(".music");

function toggleMusic(){

if(audio.paused){

audio.play();

musicButton.innerHTML="🔊";

}else{

audio.pause();

musicButton.innerHTML="🎵";

}

}

</script>

</body>

</html>
