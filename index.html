<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>BUTTS</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{

background:#000;

color:#fff;

font-family:Inter,sans-serif;

overflow-x:hidden;

}

/* Background */

body::before{

content:"BUTTS";

position:fixed;

top:50%;

left:50%;

transform:translate(-50%,-50%);

font-size:24vw;

font-weight:900;

letter-spacing:15px;

color:rgba(255,255,255,.02);

pointer-events:none;

z-index:-1;

}

.container{

width:92%;

max-width:1400px;

margin:auto;

}

/* Header */

header{

display:flex;

justify-content:space-between;

align-items:center;

padding:25px 0;

}

.top-logo{

width:80px;

height:auto;

}

.music{

width:65px;

height:65px;

border:1px solid #fff;

border-radius:50%;

display:flex;

justify-content:center;

align-items:center;

cursor:pointer;

font-size:18px;

transition:.3s;

}

.music:hover{

background:#fff;

color:#000;

}

/* Hero */

.hero{

min-height:80vh;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

text-align:center;

gap:25px;

}

.hero-logo{

width:300px;

max-width:90%;

animation:float 5s ease-in-out infinite;

}

@keyframes float{

0%,100%{

transform:translateY(0);

}

50%{

transform:translateY(-15px);

}

}

.hero h1{

font-size:60px;

max-width:800px;

}

.hero p{

max-width:650px;

font-size:20px;

line-height:1.8;

color:#9a9a9a;

}

.enter-button{

padding:18px 35px;

border:1px solid #fff;

border-radius:50px;

background:transparent;

color:#fff;

cursor:pointer;

transition:.3s;

}

.enter-button:hover{

background:#fff;

color:#000;

}

.divider{

height:1px;

background:#1a1a1a;

margin:80px 0;

}

/* Sections */

.section-title{

font-size:42px;

margin-bottom:40px;

letter-spacing:5px;

}

/* Videos */

.video-scroll{

display:flex;

gap:30px;

overflow-x:auto;

padding-bottom:15px;

}

.video-card{

min-width:400px;

height:250px;

border:1px solid #fff;

border-radius:30px;

overflow:hidden;

}

.video-card video{

width:100%;

height:100%;

object-fit:cover;

}

/* Gallery */

.gallery-grid{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(250px,1fr));

gap:25px;

}

.gallery-item{

height:300px;

overflow:hidden;

border:1px solid #fff;

border-radius:30px;

}

.gallery-item img{

width:100%;

height:100%;

object-fit:cover;

filter:grayscale(100%);

transition:.3s;

}

.gallery-item:hover img{

transform:scale(1.05);

}

footer{

padding:100px 0 50px;

text-align:center;

color:#666;

}

#audio{

display:none;

}

/* Mobile */

@media(max-width:768px){

.top-logo{

width:60px;

}

.hero-logo{

width:220px;

}

.hero h1{

font-size:38px;

}

.hero p{

font-size:18px;

}

.video-card{

min-width:320px;

height:220px;

}

.section-title{

font-size:32px;

}

.music{

width:55px;

height:55px;

}

}

</style>

</head>

<body>

<div class="container">

<header>

<video class="top-logo" autoplay muted loop playsinline>

<source src="Buttsss.gif.mp4" type="video/mp4">

</video>

<div class="music" onclick="toggleMusic()">

♫

</div>

</header>

<section class="hero">

<video class="hero-logo" autoplay muted loop playsinline>

<source src="Buttsss.gif.mp4" type="video/mp4">

</video>

<h1>

Bring Out The Weekend Drums

</h1>

<p>

The cleanest meme experience on the internet.

Videos, memes, music, chaos and pure BUTTS energy.

</p>

<button class="enter-button" onclick="document.getElementById('videos').scrollIntoView()">

Enter Chaos

</button>

</section>

<div class="divider"></div>

<section id="videos">

<div class="section-title">

VIDEOS

</div>

<div class="video-scroll">

<div class="video-card">

<video controls>

<source src="video1.mp4">

</video>

</div>

<div class="video-card">

<video controls>

<source src="video2.mp4">

</video>

</div>

<div class="video-card">

<video controls>

<source src="video3.mp4">

</video>

</div>

</div>

</section>

<div class="divider"></div>

<section>

<div class="section-title">

BUTTS GALLERY

</div>

<div class="gallery-grid">

<div class="gallery-item"><img src="gallery1.jpg"></div>

<div class="gallery-item"><img src="gallery2.jpg"></div>

<div class="gallery-item"><img src="gallery3.jpg"></div>

<div class="gallery-item"><img src="gallery4.jpg"></div>

<div class="gallery-item"><img src="gallery5.jpg"></div>

<div class="gallery-item"><img src="gallery6.jpg"></div>

</div>

</section>

<footer>

Made with pure BUTTS energy 🥁

</footer>

<audio id="audio" loop>

<source src="Buttsss(MP3_320K).mp3" type="audio/mpeg">

</audio>

</div>

<script>

const audio=document.getElementById("audio");

const music=document.querySelector(".music");

function toggleMusic(){

if(audio.paused){

audio.play();

music.innerHTML="🔊";

}else{

audio.pause();

music.innerHTML="♫";

}

}

</script>

</body>

</html>
