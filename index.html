<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BUTTS</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:#000;
color:#fff;
font-family:Inter,sans-serif;

overflow-x:hidden;
}

body::before{

content:"";

position:fixed;

inset:0;

background-image:
radial-gradient(circle at 20% 20%, rgba(255,255,255,0.04), transparent 25%),
radial-gradient(circle at 80% 60%, rgba(255,255,255,0.04), transparent 25%),
radial-gradient(circle at 50% 90%, rgba(255,255,255,0.03), transparent 25%);

pointer-events:none;

z-index:-2;

}

.container{

width:92%;

max-width:1300px;

margin:auto;

}

header{

display:flex;

justify-content:space-between;

align-items:center;

padding:35px 0;

}

.logo{

font-size:38px;

font-weight:800;

letter-spacing:8px;

}

.music{

width:55px;

height:55px;

border:1px solid #fff;

border-radius:50%;

display:flex;

justify-content:center;

align-items:center;

cursor:pointer;

font-size:22px;

transition:.3s;
}

.music:hover{

transform:rotate(15deg);

background:#fff;

color:#000;

}

.hero{

min-height:75vh;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

text-align:center;

gap:30px;

}

.hero img{

width:300px;

max-width:90%;

filter:invert(1);

opacity:.95;

animation:float 5s ease infinite;

}

@keyframes float{

0%,100%{

transform:translateY(0);

}

50%{

transform:translateY(-12px);

}

}

h1{

font-size:90px;

font-weight:800;

letter-spacing:10px;

}

.subtitle{

font-size:22px;

max-width:700px;

line-height:1.8;

color:#bdbdbd;

}

.button{

padding:18px 35px;

border:1px solid #fff;

background:transparent;

color:#fff;

border-radius:50px;

cursor:pointer;

font-size:16px;

transition:.3s;

}

.button:hover{

background:#fff;

color:#000;

}

.divider{

width:100%;

height:1px;

background:#222;

margin:100px 0 50px;

}

.section-title{

font-size:45px;

margin-bottom:40px;

letter-spacing:5px;

}

.video-grid{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(320px,1fr));

gap:30px;

}

.video-card{

height:250px;

border:1px solid #fff;

border-radius:25px;

overflow:hidden;

transition:.3s;

}

.video-card:hover{

transform:scale(1.03);

}

.video-card video{

width:100%;

height:100%;

object-fit:cover;

}

.gallery-grid{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(250px,1fr));

gap:25px;

}

.gallery-item{

overflow:hidden;

border:1px solid #fff;

border-radius:25px;

height:300px;

}

.gallery-item img{

width:100%;

height:100%;

object-fit:cover;

filter:grayscale(100%);

transition:.4s;

}

.gallery-item:hover img{

transform:scale(1.08);

}

footer{

padding:100px 0 50px;

text-align:center;

color:#777;

font-size:14px;

}

#audio{

display:none;

}

@media(max-width:768px){

h1{

font-size:60px;

}

.logo{

font-size:28px;

}

.subtitle{

font-size:18px;

}

.section-title{

font-size:34px;

}

}

</style>

</head>

<body>

<div class="container">

<header>

<div class="logo">

BUTTS

</div>

<div class="music" onclick="toggleMusic()">

🎵

</div>

</header>

<section class="hero">

<img src="butts-logo.png">

<h1>BUTTS</h1>

<div class="subtitle">

The cleanest meme experience on the internet.

Videos, memes, music, chaos and pure BUTTS energy.

</div>

<button class="button">

Enter Chaos

</button>

</section>

<div class="divider"></div>

<section>

<div class="section-title">

VIDEOS

</div>

<div class="video-grid">

<div class="video-card">

<video controls>

<source src="video1.mp4">

</video>

</div>

<div class="video-card">

<video controls>

<source src="video2.mp4">

</video>

</div>

<div class="video-card">

<video controls>

<source src="video3.mp4">

</video>

</div>

</div>

</section>

<div class="divider"></div>

<section>

<div class="section-title">

BUTTS GALLERY

</div>

<div class="gallery-grid">

<div class="gallery-item">

<img src="gallery1.jpg">

</div>

<div class="gallery-item">

<img src="gallery2.jpg">

</div>

<div class="gallery-item">

<img src="gallery3.jpg">

</div>

<div class="gallery-item">

<img src="gallery4.jpg">

</div>

<div class="gallery-item">

<img src="gallery5.jpg">

</div>

<div class="gallery-item">

<img src="gallery6.jpg">

</div>

</div>

</section>

<footer>

Made with pure BUTTS energy.

</footer>

<audio id="audio" loop>

<source src="music.mp3">

</audio>

</div>

<script>

let audio=document.getElementById('audio');

function toggleMusic(){

if(audio.paused){

audio.play();

}else{

audio.pause();

}

}

</script>

</body>

</html>
